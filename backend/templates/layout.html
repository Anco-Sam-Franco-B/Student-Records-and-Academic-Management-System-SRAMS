<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>SRAMS Notification</title>


<style>


/* GLOBAL */

body {

    margin:0;

    padding:40px 20px;

    background:#eef2ff;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Arial,
    sans-serif;

    color:#334155;

}





/* MAIN WRAPPER */


.container {


    max-width:720px;

    margin:auto;

    background:#ffffff;

    border-radius:28px;

    overflow:hidden;

    box-shadow:
    0 25px 70px rgba(15,23,42,.12);


}






/* HEADER */


.header {


    position:relative;

    padding:50px 35px;

    text-align:center;

    color:white;


    background:

    radial-gradient(
        circle at top right,
        rgba(255,255,255,.25),
        transparent 35%
    ),

    linear-gradient(
        135deg,
        #1d4ed8,
        #2563eb,
        #06b6d4
    );


}





.logo {


    font-size:42px;

    font-weight:900;

    letter-spacing:-1px;


}




.brand {


    margin-top:12px;

    font-size:15px;

    opacity:.9;

    letter-spacing:.4px;


}




.status {


    display:inline-block;

    margin-top:25px;

    padding:8px 22px;

    border-radius:50px;

    background:
    rgba(255,255,255,.18);


    border:
    1px solid rgba(255,255,255,.3);


    font-size:13px;

    font-weight:700;


}







/* CONTENT */


.content {


    padding:45px;

    line-height:1.7;


}




.content h1 {


    color:#0f172a;

    font-size:34px;


}




.content h2 {


    color:#0f172a;

    font-size:24px;


}




.content h3 {


    color:#1e293b;


}





.content p {


    font-size:16px;

    color:#475569;


}





/* CARDS */


.card {


    background:#f8fafc;

    border-radius:20px;

    padding:25px;

    margin:25px 0;

    border:

    1px solid #e2e8f0;


}





/* SUCCESS CARD */


.success-card {


    background:#ecfdf5;

    border-left:

    5px solid #22c55e;


}





/* WARNING CARD */


.warning-card {


    background:#fff7ed;

    border-left:

    5px solid #f97316;


}






/* BUTTON */


.button {


    display:inline-block;

    padding:

    16px 38px;


    border-radius:14px;


    background:

    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );


    color:white!important;

    text-decoration:none;


    font-weight:800;


    font-size:15px;


    box-shadow:

    0 10px 25px rgba(37,99,235,.25);


}







/* BADGES */


.badge {


    display:inline-block;


    padding:

    7px 18px;


    border-radius:50px;


    font-size:12px;


    font-weight:800;


}



.badge-success {


    background:#dcfce7;

    color:#15803d;


}




.badge-danger {


    background:#fee2e2;

    color:#dc2626;


}






/* TABLES */


table {


    border-collapse:collapse;

}





td {


    padding:12px;


}





/* FOOTER */


.footer {


    padding:

    30px;


    text-align:center;


    background:#f8fafc;


    color:#64748b;


    font-size:13px;


}




.footer strong {


    color:#2563eb;


}







/* MOBILE */


@media(max-width:600px){


body {

padding:15px;

}



.container {

border-radius:18px;

}



.header {

padding:35px 20px;

}



.content {

padding:25px;

}



.logo {

font-size:34px;

}



}





</style>


</head>



<body>


<div class="container">





<!-- HEADER -->


<div class="header">


<div class="logo">

🎓 SRAMS

</div>



<div class="brand">

Student Records & Academics Management System

</div>



<div class="status">

SYSTEM NOTIFICATION

</div>



</div>







<!-- EMAIL CONTENT -->


<div class="content">


{{{body}}}


</div>







<!-- FOOTER -->


<div class="footer">


<p>

<strong>SRAMS</strong>

<br>

Smart Academic Management Platform

</p>


<p>

Generated automatically by SRAMS Notification Engine

</p>



<p>

© {{year}} SRAMS. All rights reserved.

</p>


</div>





</div>


</body>


</html>
